name: Tests

on: [push, pull_request]

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nvim_version: ["stable", "nightly"]

    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: MunifTanjim/setup-neovim-action@v1
        with:
          tag: ${{ matrix.nvim_version }}

      - name: Add plenary.nvim
        run: |
          git clone --depth 1 https://github.com/nvim-lua/plenary.nvim ~/.local/share/nvim/site/pack/plenary/start/plenary.nvim

      - name: Run tests
        run: |
          nvim --headless --noplugin \
            -c "luafile tests/stackmap_spec.lua" \
            -c "qa!"
        continue-on-error: false

      - name: Run tests (plenary)
        run: |
          nvim --headless --noplugin \
            -u NONE \
            -c "set rtp+=$HOME/.local/share/nvim/site/pack/plenary/start/plenary.nvim" \
            -c "set rtp+=." \
            -c "lua require('plenary.test_harness').test_directory('tests/')" \
            -c "qa!"
